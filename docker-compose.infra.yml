version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: ds-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    container_name: ds-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: distributed
      POSTGRES_PASSWORD: distributed
      POSTGRES_DB: distributed_systems
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U distributed"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  postgres-data:
