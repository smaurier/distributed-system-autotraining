<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 11 — Replication & Sharding</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 11 — Replication & Sharding</h1>
    <p class="subtitle">Leader-follower, consistent hashing, virtual nodes, sharding et rebalancing</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Leader-Follower",
        text: "Dans une replication leader-follower, quel est le role de chaque noeud ?",
        code: "// Leader (primary)\n// - Recoit TOUTES les ecritures\n// - Propage les changements aux followers\n\n// Followers (replicas)\n// - Recoivent les ecritures du leader (replication log)\n// - Servent les lectures (read replicas)\n// - Peuvent etre promus leader si le leader tombe",
        options: [
          "Le leader et les followers ont exactement le meme role",
          "Le leader gere les ecritures et propage les changements ; les followers servent les lectures et peuvent etre promus en cas de panne du leader",
          "Les followers gerent les ecritures et le leader gere les lectures",
          "Le leader est un serveur de cache et les followers sont les bases de donnees"
        ],
        answer: 1,
        explanation: "Le leader (primary) est le seul a accepter les ecritures, garantissant un point unique de verite. Les followers repliquent les donnees et servent les lectures, permettant le scale-out en lecture. Si le leader tombe, un follower est promu leader (failover)."
      },
      {
        label: "Question 2 — Consistent Hashing",
        text: "Pourquoi le consistent hashing est-il preferable au hash modulo classique (hash(key) % N) pour le sharding ?",
        code: "// Hash modulo: hash(key) % 3 noeuds\n// Si on ajoute un 4e noeud: hash(key) % 4\n// -> presque TOUTES les cles changent de noeud !\n\n// Consistent hashing: anneau de hash\n// Si on ajoute un noeud, seules les cles du segment\n// adjacent sont redistribuees (~1/N des cles)",
        options: [
          "Le consistent hashing est plus rapide a calculer",
          "Avec hash modulo, l'ajout/retrait d'un noeud redistribue presque toutes les cles. Avec consistent hashing, seule une fraction (~1/N) des cles est deplacee",
          "Le consistent hashing n'utilise pas de fonction de hash",
          "Hash modulo ne fonctionne qu'avec des nombres premiers de noeuds"
        ],
        answer: 1,
        explanation: "Avec hash(key) % N, changer N redistribue la quasi-totalite des cles (cache invalidation massive). Le consistent hashing place noeuds et cles sur un anneau : l'ajout d'un noeud ne deplace que les cles du segment adjacent, minimisant le mouvement de donnees."
      },
      {
        label: "Question 3 — Virtual Nodes",
        text: "Quel probleme les virtual nodes (vnodes) resolvent-ils dans le consistent hashing ?",
        code: "// Sans vnodes: 3 noeuds physiques sur l'anneau\n// -> distribution potentiellement desequilibree\n// Noeud A: 50% des cles, B: 30%, C: 20%\n\n// Avec vnodes: chaque noeud physique = 256 vnodes\n// -> 768 points sur l'anneau\n// Noeud A: ~33%, B: ~33%, C: ~33%",
        options: [
          "Les vnodes accelerent le calcul du hash",
          "Les vnodes permettent une distribution plus uniforme des cles en multipliant les points de chaque noeud sur l'anneau, et facilitent le rebalancing quand les noeuds ont des capacites differentes",
          "Les vnodes sont necessaires uniquement pour le chiffrement",
          "Les vnodes remplacent completement le consistent hashing"
        ],
        answer: 1,
        explanation: "Avec peu de noeuds physiques, le consistent hashing peut creer une distribution desequilibree. Les vnodes multiplient les positions de chaque noeud sur l'anneau (ex: 256 vnodes/noeud), lissant statistiquement la distribution. On peut aussi assigner plus de vnodes aux serveurs plus puissants."
      },
      {
        label: "Question 4 — Sharding",
        text: "Quel est le principal defi du sharding (partitionnement horizontal) des donnees ?",
        code: "// Shard par userId\n// Shard 0: users 0-999\n// Shard 1: users 1000-1999\n// Shard 2: users 2000-2999\n\n// Requete simple (OK): SELECT * FROM orders WHERE userId = 1500\n// -> va directement au Shard 1\n\n// Requete cross-shard (problematique):\n// SELECT * FROM orders ORDER BY date LIMIT 10\n// -> doit interroger TOUS les shards et fusionner !",
        options: [
          "Le sharding est trop simple a implementer pour etre utile",
          "Les requetes qui ne contiennent pas la shard key doivent interroger tous les shards (scatter-gather), ce qui degrade les performances et complexifie les jointures cross-shard",
          "Le sharding empeche toute forme de replication",
          "Le sharding ne fonctionne qu'avec des bases NoSQL"
        ],
        answer: 1,
        explanation: "Le sharding excelle pour les requetes ciblant une partition (single-shard). Mais les requetes sans shard key (ex: tri global, agregations) necessitent un scatter-gather sur tous les shards, augmentant la latence. Les jointures cross-shard sont particulierement couteuses."
      },
      {
        label: "Question 5 — Rebalancing",
        text: "Lors de l'ajout d'un nouveau noeud au cluster, quelle strategie de rebalancing minimise l'impact sur les performances ?",
        code: null,
        options: [
          "Arreter le cluster, redistribuer toutes les donnees, puis redemarrer",
          "Deplacer les donnees de maniere incrementale en arriere-plan (background rebalancing), en limitant le debit de transfert pour ne pas saturer le reseau et en continuant a servir les requetes",
          "Copier toutes les donnees sur le nouveau noeud immediatement",
          "Supprimer les donnees les plus anciennes pour faire de la place"
        ],
        answer: 1,
        explanation: "Le rebalancing incremental en arriere-plan (utilise par Cassandra, Kafka, etc.) migre les donnees progressivement avec un throttle sur le debit. Le cluster reste disponible pendant l'operation. Les requetes vers les donnees en cours de migration sont redirigees vers l'ancien noeud jusqu'a completion."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
