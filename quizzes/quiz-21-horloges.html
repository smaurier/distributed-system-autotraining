<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 21 — Horloges Distribuees</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 21 — Horloges Distribuees</h1>
    <p class="subtitle">Lamport timestamps, vector clocks, HLC, happened-before et causal ordering</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Lamport Timestamps",
        text: "Comment fonctionnent les horloges de Lamport et quelle propriete garantissent-elles ?",
        code: "// Regles de Lamport:\n// 1. Avant chaque evenement local: counter++\n// 2. Envoi de message: envoyer (msg, counter)\n// 3. Reception: counter = max(local, received) + 1\n\n// Process A: a1(1) -> a2(2) ----send(2)----> \n// Process B:                  b1(1) -> receive(3) -> b2(4)",
        options: [
          "Les horloges de Lamport mesurent le temps reel avec precision",
          "Elles garantissent que si a happened-before b, alors L(a) < L(b). Mais l'inverse n'est pas vrai : L(a) < L(b) ne signifie pas que a happened-before b",
          "Elles garantissent un ordre total parfait de tous les evenements",
          "Elles ne fonctionnent que sur un seul processus"
        ],
        answer: 1,
        explanation: "Les horloges de Lamport capturent la causalite dans un sens : si a -> b (happened-before), alors L(a) < L(b). Cependant, deux evenements concurrents peuvent avoir des timestamps differents sans relation causale. On ne peut pas deduire la causalite du timestamp seul."
      },
      {
        label: "Question 2 — Vector Clocks",
        text: "Quel avantage les vector clocks ont-elles par rapport aux horloges de Lamport ?",
        code: "// 3 processus: A, B, C\n// Vector clock = [A, B, C]\n\n// A: a1[1,0,0] envoie msg a B\n// B: recoit -> b1[1,1,0]  (max composante par composante + 1 pour B)\n// C: c1[0,0,1]  (evenement concurrent a a1 et b1)\n\n// Comparaison:\n// [1,1,0] et [0,0,1] -> ni l'un <= l'autre -> CONCURRENT !",
        options: [
          "Les vector clocks utilisent moins de memoire",
          "Les vector clocks peuvent detecter la concurrence : si ni V(a) <= V(b) ni V(b) <= V(a), alors a et b sont concurrents. Les horloges de Lamport ne permettent pas cette detection",
          "Les vector clocks sont plus rapides a calculer",
          "Les vector clocks fonctionnent sans reseau"
        ],
        answer: 1,
        explanation: "Les vector clocks maintiennent un compteur par processus. On peut determiner si deux evenements sont causalement lies (un vecteur domine l'autre composante par composante) ou concurrents (aucun ne domine). C'est impossible avec un simple scalaire de Lamport."
      },
      {
        label: "Question 3 — Hybrid Logical Clocks (HLC)",
        text: "Pourquoi les Hybrid Logical Clocks (HLC) sont-elles utilisees en pratique plutot que les horloges de Lamport pures ?",
        code: "// HLC = (physical_time, logical_counter)\n// Combine horloge physique (NTP) et logique\n\n// Avantage: le timestamp est proche du temps reel\n// tout en garantissant la causalite\n\n// Event a: hlc = (1000ms, 0)\n// Event b (apres a): hlc = (1000ms, 1) si meme ms\n//                    hlc = (1001ms, 0) si ms differente",
        options: [
          "Les HLC sont plus simples a implementer que les horloges de Lamport",
          "Les HLC combinent temps physique (pour la lisibilite et les TTL) et compteur logique (pour la causalite), offrant le meilleur des deux mondes",
          "Les HLC remplacent completement NTP",
          "Les HLC ne garantissent aucune propriete de causalite"
        ],
        answer: 1,
        explanation: "Les HLC utilisent le temps physique (NTP) comme base, ce qui rend les timestamps lisibles et compatibles avec les TTL/expirations. Le compteur logique prend le relais quand le temps physique ne suffit pas a distinguer les evenements, preservant l'ordre causal."
      },
      {
        label: "Question 4 — Happened-Before",
        text: "Quand peut-on dire que l'evenement a 'happened-before' l'evenement b (note a -> b) ?",
        code: null,
        options: [
          "Quand a et b se produisent sur le meme serveur physique",
          "Quand a et b sont sur le meme processus et a precede b, OU quand a est l'envoi d'un message et b sa reception, OU par transitivite (a -> c et c -> b implique a -> b)",
          "Quand le timestamp mural de a est inferieur a celui de b",
          "Quand a et b modifient la meme variable"
        ],
        answer: 1,
        explanation: "La relation happened-before (Lamport 1978) a trois regles : (1) ordre local au sein d'un processus, (2) causalite par message (envoi -> reception), (3) transitivite. Deux evenements sans relation happened-before sont dits concurrents — ni l'un ni l'autre n'a cause l'autre."
      },
      {
        label: "Question 5 — Causal Ordering",
        text: "Pourquoi le causal ordering est-il important dans un systeme de chat distribue ?",
        code: "// Sans causal ordering:\n// Alice envoie: \"Quelqu'un connait un bon resto ?\" (t=1)\n// Bob voit le message d'Alice et repond: \"Oui, Le Comptoir\" (t=2)\n// Charlie recoit d'abord le msg de Bob puis celui d'Alice:\n//   \"Oui, Le Comptoir\"    <- hein ? de quoi il parle ?\n//   \"Quelqu'un connait un bon resto ?\"",
        options: [
          "Le causal ordering n'a aucune importance dans un chat",
          "Sans causal ordering, un utilisateur peut voir une reponse avant la question qui l'a causee, rendant la conversation incomprehensible. Le causal ordering garantit que si un message est cause par un autre, ils sont affiches dans le bon ordre",
          "Le causal ordering est necessaire uniquement pour le chiffrement des messages",
          "Le causal ordering trie les messages par ordre alphabetique"
        ],
        answer: 1,
        explanation: "Le causal ordering garantit que si le message B est une reaction au message A, tout noeud qui delivre B a deja delivre A. Cela preserve la coherence semantique des conversations. C'est plus faible que l'ordre total (les messages concurrents peuvent etre dans n'importe quel ordre) mais suffisant pour la plupart des use cases."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
