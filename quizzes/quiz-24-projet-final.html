<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 24 — Projet Final</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 24 — Projet Final</h1>
    <p class="subtitle">Saga + Event Sourcing + Circuit Breaker + Outbox + Rate Limiting — synthese du cours</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Saga + Event Sourcing",
        text: "Dans une architecture combinant saga orchestree et event sourcing, comment l'orchestrateur peut-il reprendre apres un crash ?",
        code: "// Event Store de la saga\nevents = [\n  { type: 'SagaStarted', orderId: '42' },\n  { type: 'PaymentRequested', amount: 99.99 },\n  { type: 'PaymentSucceeded', txId: 'pay-1' },\n  { type: 'InventoryReserveRequested', items: [...] },\n  // crash ici — pas de reponse de l'inventory\n]\n\n// Apres redemarrage:\n// 1. Rejouer les events -> etat: 'AWAITING_INVENTORY'\n// 2. Reprendre a l'etape en cours (retry ou timeout)",
        options: [
          "L'orchestrateur recommence la saga depuis le debut, y compris le paiement",
          "En rejouant les events du store, l'orchestrateur reconstruit son etat exact au moment du crash et reprend a l'etape en cours sans re-executer les etapes deja completees",
          "L'orchestrateur abandonne la saga et rembourse automatiquement",
          "Il est impossible de reprendre une saga apres un crash"
        ],
        answer: 1,
        explanation: "L'event sourcing rend l'orchestrateur de saga resilient aux crashes. En rejouant les events, il reconstruit son etat (etape courante, resultats intermediaires). Il reprend exactement ou il s'etait arrete, sans re-executer les etapes reussies (qui sont idempotentes de toute facon)."
      },
      {
        label: "Question 2 — Circuit Breaker + Rate Limiting",
        text: "Comment le circuit breaker et le rate limiting cooperent-ils pour proteger un systeme distribue ?",
        code: "// Couche 1: Rate Limiter (en entree)\n// -> Limite le nombre de requetes acceptees\n// -> Protege NOTRE service contre la surcharge\n\n// Couche 2: Circuit Breaker (en sortie)\n// -> Detecte les pannes d'un service downstream\n// -> Coupe les appels vers un service defaillant\n// -> Protege LE SERVICE DOWNSTREAM et evite le cascading failure\n\n// Flux: Client -> [Rate Limiter] -> Notre Service -> [Circuit Breaker] -> Service Downstream",
        options: [
          "Ils font exactement la meme chose et sont redondants",
          "Le rate limiter protege notre service en amont (limite le trafic entrant), tandis que le circuit breaker protege les services downstream en aval (coupe les appels vers un service defaillant). Ensemble, ils evitent la surcharge dans les deux directions",
          "Le circuit breaker remplace le rate limiter quand il est ouvert",
          "Le rate limiter fonctionne uniquement avec le circuit breaker ferme"
        ],
        answer: 1,
        explanation: "Ce sont deux mecanismes complementaires : le rate limiter est un bouclier en amont (protection contre les pics de trafic), le circuit breaker est un coupe-circuit en aval (protection contre les pannes en cascade). Ensemble, ils forment une defense en profondeur du systeme distribue."
      },
      {
        label: "Question 3 — Outbox Pattern",
        text: "Pourquoi le transactional outbox pattern est-il prefere a la publication directe d'events apres un commit en base de donnees ?",
        code: "// PROBLEME: dual write\nasync function createOrder(order) {\n  await db.insert('orders', order);   // 1. ecriture DB\n  await eventBus.publish('OrderCreated', order); // 2. publication event\n  // Si le crash survient entre 1 et 2 -> event perdu !\n}\n\n// SOLUTION: outbox pattern\nasync function createOrder(order) {\n  await db.transaction(async (tx) => {\n    await tx.insert('orders', order);\n    await tx.insert('outbox', {      // meme transaction !\n      type: 'OrderCreated',\n      payload: JSON.stringify(order)\n    });\n  });\n  // Un poller/CDC lit la table outbox et publie les events\n}",
        options: [
          "Le outbox pattern est plus rapide car il utilise moins de requetes",
          "Le outbox pattern evite le dual write en ecrivant l'event dans une table outbox dans la MEME transaction que la donnee metier. Un processus separe (poller ou CDC) publie ensuite les events, garantissant la coherence entre la DB et les events",
          "Le outbox pattern elimine le besoin d'un event bus",
          "Le outbox pattern stocke les events dans le cache au lieu de la base de donnees"
        ],
        answer: 1,
        explanation: "Le dual write (ecriture DB + publication event) n'est pas atomique : un crash entre les deux laisse le systeme incoherent. L'outbox pattern rend l'operation atomique via une seule transaction DB. Un relay (polling ou CDC comme Debezium) publie ensuite les events de maniere fiable."
      },
      {
        label: "Question 4 — Event Sourcing + Circuit Breaker",
        text: "Dans un systeme event-source, comment gerer le cas ou la projection read-model depend d'un service externe protege par un circuit breaker ouvert ?",
        code: "// Projection qui enrichit les orders avec les infos client\nasync function handleOrderPlaced(event) {\n  try {\n    const customer = await customerService.get(event.customerId);\n    // circuit breaker OPEN -> exception !\n    await readDb.upsert('order_view', {\n      orderId: event.orderId,\n      customerName: customer.name,\n      total: event.total\n    });\n  } catch (err) {\n    if (err instanceof CircuitBreakerOpenError) {\n      // Que faire ?\n    }\n  }\n}",
        options: [
          "Ignorer l'event et ne jamais retenter — les donnees seront incompletes",
          "Projeter les donnees disponibles immediatement (sans le nom client) et retraiter l'event plus tard quand le circuit breaker se referme, en mettant l'event dans une retry queue ou en replayant depuis l'offset sauvegarde",
          "Arreter completement la projection jusqu'a ce que le service externe revienne",
          "Supprimer l'event du store car il ne peut pas etre traite"
        ],
        answer: 1,
        explanation: "La strategie resiliente consiste a projeter ce qu'on peut immediatement (degradation gracieuse) et a planifier un retraitement pour enrichir plus tard. L'event sourcing facilite cela : on peut replayer les events depuis un offset specifique. La projection finira par etre complete (eventual consistency)."
      },
      {
        label: "Question 5 — Architecture complete",
        text: "Dans cette architecture e-commerce distribuee, identifiez le pattern qui resout chaque probleme.",
        code: "// Problemes a resoudre:\n// A) Le payment-service est parfois lent (3s+) -> clients timeout\n// B) La creation de commande doit etre coherente entre DB et events\n// C) Si le shipping echoue, il faut annuler le paiement\n// D) Un pic de trafic Black Friday surcharge l'API\n// E) L'historique des commandes doit etre auditable et immutable",
        options: [
          "A=Caching, B=2PC, C=Retry, D=Autoscaling seul, E=Logging",
          "A=Circuit Breaker (coupe les appels au service lent), B=Outbox Pattern (atomicite DB+events), C=Saga avec compensation (annulation du paiement), D=Rate Limiting (protection contre la surcharge), E=Event Sourcing (historique immutable et auditable)",
          "A=Rate Limiting, B=Event Sourcing, C=Circuit Breaker, D=Outbox, E=Saga",
          "A=Saga, B=Circuit Breaker, C=Rate Limiting, D=Event Sourcing, E=Outbox"
        ],
        answer: 1,
        explanation: "Chaque pattern a son role precis : le Circuit Breaker protege contre les services lents, l'Outbox garantit la coherence DB/events, la Saga orchestre les transactions distribuees avec compensations, le Rate Limiting protege contre les pics de trafic, et l'Event Sourcing fournit un audit trail immutable."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
