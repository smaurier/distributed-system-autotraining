<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 12 — Saga Pattern</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 12 — Saga Pattern</h1>
    <p class="subtitle">2PC, choregraphie vs orchestration, compensating transactions et saga pattern</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — 2PC Blocking",
        text: "Pourquoi le Two-Phase Commit (2PC) est-il considere comme problematique dans un systeme distribue ?",
        code: "// Phase 1: PREPARE\ncoordinator -> participant_A: PREPARE\ncoordinator -> participant_B: PREPARE\n// Les deux repondent: READY\n\n// Phase 2: COMMIT\ncoordinator -> participant_A: COMMIT\n// coordinator tombe en panne ici !\ncoordinator -> participant_B: ???  // jamais envoye",
        options: [
          "2PC est trop rapide et consomme trop de bande passante",
          "2PC est un protocole bloquant : si le coordinateur tombe apres la phase PREPARE, les participants restent bloques (verrous maintenus) dans l'attente d'un COMMIT ou ABORT qui ne viendra pas",
          "2PC ne fonctionne qu'avec des bases de donnees NoSQL",
          "2PC est non-bloquant et n'a aucun probleme connu"
        ],
        answer: 1,
        explanation: "Le 2PC est bloquant : apres avoir vote READY, un participant detient des verrous et ne peut ni committer ni annuler seul. Si le coordinateur tombe, les participants sont bloques indefiniment. C'est pourquoi les Sagas sont preferees dans les microservices."
      },
      {
        label: "Question 2 — Choregraphie vs Orchestration",
        text: "Quelle est la difference entre une saga choregraphiee et une saga orchestree ?",
        code: "// Choregraphie: chaque service reagit aux events\n// OrderService -> OrderPlaced\n//   PaymentService ecoute -> PaymentProcessed\n//     InventoryService ecoute -> StockReserved\n\n// Orchestration: un orchestrateur central\n// SagaOrchestrator:\n//   1. appelle PaymentService.process()\n//   2. appelle InventoryService.reserve()\n//   3. appelle ShippingService.ship()",
        options: [
          "La choregraphie utilise HTTP et l'orchestration utilise gRPC",
          "Dans la choregraphie, les services reagissent aux events de maniere decentralisee. Dans l'orchestration, un orchestrateur central coordonne les etapes sequentiellement",
          "La choregraphie est toujours meilleure que l'orchestration",
          "Il n'y a aucune difference entre les deux approches"
        ],
        answer: 1,
        explanation: "Choregraphie : decentralisee, chaque service emet et ecoute des events. Simple pour peu d'etapes mais difficile a suivre (spaghetti events). Orchestration : un orchestrateur central controle le flux. Plus facile a comprendre et debugger mais introduit un point central."
      },
      {
        label: "Question 3 — Compensating Transactions",
        text: "Qu'est-ce qu'une compensating transaction et quand est-elle declenchee ?",
        code: "// Saga: Reservation de voyage\n// Step 1: reserver vol       -> OK\n// Step 2: reserver hotel      -> OK  \n// Step 3: reserver voiture    -> ECHEC !\n\n// Compensations (ordre inverse):\n// Compensate 2: annuler hotel\n// Compensate 1: annuler vol",
        options: [
          "C'est une transaction qui double le montant paye en cas d'erreur",
          "C'est une action qui annule semantiquement l'effet d'une etape precedente de la saga, declenchee quand une etape ulterieure echoue",
          "C'est une transaction qui recommence depuis le debut",
          "C'est une transaction qui ignore les erreurs et continue"
        ],
        answer: 1,
        explanation: "Une compensating transaction defait l'effet d'une etape deja executee. Ce n'est pas un ROLLBACK technique mais une action metier inverse (ex: annuler une reservation, rembourser un paiement). Elles sont executees en ordre inverse des etapes reussies."
      },
      {
        label: "Question 4 — Saga et coherence",
        text: "Quel type de coherence une saga garantit-elle entre les services participants ?",
        code: null,
        options: [
          "Strong consistency (ACID) comme une transaction distribuee classique",
          "Eventual consistency : les donnees sont temporairement incoherentes entre les etapes, mais convergent vers un etat coherent a la fin de la saga (succes complet ou compensations completes)",
          "Aucune coherence n'est jamais garantie",
          "Coherence lineaire grace au coordinateur central"
        ],
        answer: 1,
        explanation: "Les Sagas ne fournissent pas d'isolation ACID. Entre les etapes, le systeme est temporairement incoherent (ex: paiement debite mais hotel pas encore reserve). La saga garantit l'eventual consistency : soit toutes les etapes reussissent, soit toutes sont compensees."
      },
      {
        label: "Question 5 — Saga Orchestree",
        text: "Quel est l'avantage principal et le risque de la saga orchestree avec un coordinateur central ?",
        code: "class OrderSaga {\n  async execute(order) {\n    try {\n      await this.paymentService.charge(order);\n      await this.inventoryService.reserve(order);\n      await this.shippingService.schedule(order);\n      await this.setState('COMPLETED');\n    } catch (e) {\n      await this.compensate(); // rollback inverse\n    }\n  }\n  async compensate() {\n    // Execute les compensations en ordre inverse\n    for (const step of this.completedSteps.reverse()) {\n      await step.compensate();\n    }\n    await this.setState('COMPENSATED');\n  }\n}",
        options: [
          "Avantage : aucun couplage. Risque : impossible a debugger",
          "Avantage : le flux est explicite et facile a comprendre dans un seul endroit. Risque : l'orchestrateur est un single point of failure et un point de couplage",
          "Avantage : pas besoin de compensations. Risque : trop de microservices",
          "Aucun avantage ni risque notable"
        ],
        answer: 1,
        explanation: "L'orchestration centralise la logique du workflow dans un seul composant lisible et testable. Cependant, l'orchestrateur connait tous les participants (couplage) et sa panne bloque la saga. Il faut le rendre resilient (persistence de l'etat, reprise apres crash)."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
