<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 16 — Circuit Breaker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 16 — Circuit Breaker</h1>
    <p class="subtitle">Circuit breaker, bulkhead, backpressure et degradation gracieuse</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Circuit Breaker States",
        text: "Un circuit breaker est en etat OPEN depuis 30 secondes. Le timer d'attente est configure a 30s. Que se passe-t-il a la prochaine requete ?",
        code: "const breaker = new CircuitBreaker({\n  failureThreshold: 5,\n  resetTimeout: 30000,  // 30 secondes\n});\n// Etat actuel : OPEN depuis 30s",
        options: [
          "La requete est rejetee immediatement car le circuit est OPEN",
          "Le circuit passe en HALF-OPEN et laisse passer UNE requete de test pour verifier si le service est retabli",
          "Le circuit passe directement en CLOSED et laisse passer toutes les requetes",
          "Le circuit est reinitialise et le compteur d'erreurs repart a zero"
        ],
        answer: 1,
        explanation: "Apres le resetTimeout, le circuit passe de OPEN a HALF-OPEN. Il laisse passer une (ou quelques) requete(s) de test. Si elle reussit, le circuit passe en CLOSED. Si elle echoue, il retourne en OPEN pour un nouveau cycle d'attente."
      },
      {
        label: "Question 2 — Bulkhead Pattern",
        text: "Un service appelle 3 APIs externes avec un pool unique de 10 threads. L'API C devient lente et consomme les 10 threads. Quel pattern isole ce probleme ?",
        code: null,
        options: [
          "Le circuit breaker, qui coupe les appels a l'API C",
          "Le bulkhead pattern, qui alloue des pools de ressources separes a chaque dependance pour eviter qu'une dependance lente n'affecte les autres",
          "Le retry pattern avec backoff exponentiel",
          "Le cache-aside pattern pour eviter les appels reseau"
        ],
        answer: 1,
        explanation: "Le bulkhead (cloison de navire) isole les ressources par dependance. Avec des pools separes (ex: 4 threads pour A, 3 pour B, 3 pour C), si C est lente, seuls ses 3 threads sont bloques. A et B continuent de fonctionner normalement."
      },
      {
        label: "Question 3 — Backpressure",
        text: "Un producteur envoie 10 000 msg/s mais le consommateur ne peut en traiter que 2 000/s. Quelle strategie de backpressure est illustree ici ?",
        code: "// Reactive Streams / RxJS style\nconst subscription = source$.pipe(\n  // Le consommateur demande explicitement\n  // le nombre d'elements qu'il peut traiter\n  observeOn(asyncScheduler),\n  bufferCount(100),\n  concatMap(batch => processBatch(batch))\n);",
        options: [
          "Drop strategy : les messages excessifs sont supprimes",
          "Flow control : le consommateur controle le rythme en demandant les messages par lots qu'il peut traiter",
          "Sampling : on ne prend qu'un message sur cinq",
          "Priority queue : les messages importants passent en premier"
        ],
        answer: 1,
        explanation: "C'est du flow control (pull-based backpressure). Le consommateur tire les messages a son rythme via bufferCount et concatMap, ce qui empeche naturellement la surcharge. Le producteur est ralenti implicitement par la contrepression."
      },
      {
        label: "Question 4 — Graceful Degradation",
        text: "Le service de recommandations est en panne. Comment le site e-commerce devrait-il reagir ?",
        code: "async function getProductPage(productId) {\n  const product = await productService.get(productId);\n\n  let recommendations;\n  try {\n    recommendations = await recommendationService.get(productId);\n  } catch (err) {\n    // ??? Que faire ici ???\n  }\n\n  return renderPage(product, recommendations);\n}",
        options: [
          "Afficher une page d'erreur 500 a l'utilisateur",
          "Retourner une reponse vide et ne rien afficher",
          "Afficher la page produit avec des recommandations generiques (best-sellers) en fallback, en degradant gracieusement la fonctionnalite non critique",
          "Relancer indefiniment la requete jusqu'a ce que le service reponde"
        ],
        answer: 2,
        explanation: "La degradation gracieuse consiste a continuer de fournir la fonctionnalite principale (afficher le produit) meme si une fonctionnalite secondaire (recommandations) est indisponible. Un fallback (ex: best-sellers caches) offre une experience acceptable."
      },
      {
        label: "Question 5 — Combinaison de patterns",
        text: "Dans quelle sequence ces patterns de resilience doivent-ils etre appliques pour une requete sortante ?",
        code: "// Quelle est la bonne imbrication ?\nclient.call(\n  // timeout → retry → circuit breaker ?\n  // circuit breaker → retry → timeout ?\n  // retry → circuit breaker → timeout ?\n)",
        options: [
          "Timeout (interne) → Retry → Circuit Breaker (externe) : le timeout protege chaque tentative, le retry retente, le circuit breaker surveille le taux global d'echecs",
          "Circuit Breaker → Timeout → Retry : le circuit breaker est verifie en premier, puis chaque tentative a un timeout",
          "Retry → Timeout → Circuit Breaker : on retente d'abord, puis on applique un timeout",
          "L'ordre n'a aucune importance, ils sont independants"
        ],
        answer: 0,
        explanation: "L'ordre classique est : Circuit Breaker (couche externe, verifie si on doit meme essayer) → Retry (retente si echec) → Timeout (couche interne, limite chaque tentative). Mais vu de l'imbrication du code, Timeout est le plus interne, applique a chaque appel individuel."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
