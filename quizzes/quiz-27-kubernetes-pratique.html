<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 27 — Kubernetes en pratique</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 27 — Kubernetes en pratique</h1>
    <p class="subtitle">HPA, Helm, strategies de deploiement, monitoring et troubleshooting</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Horizontal Pod Autoscaler",
        text: "Comment le HPA calcule-t-il le nombre de replicas necessaires ?",
        code: "apiVersion: autoscaling/v2\nkind: HorizontalPodAutoscaler\nspec:\n  scaleTargetRef:\n    apiVersion: apps/v1\n    kind: Deployment\n    name: api\n  minReplicas: 2\n  maxReplicas: 10\n  metrics:\n  - type: Resource\n    resource:\n      name: cpu\n      target:\n        type: Utilization\n        averageUtilization: 50\n\n# Formule: desired = ceil(current * (currentMetric / targetMetric))\n# Ex: 3 replicas, CPU a 80%, target 50%\n# desired = ceil(3 * (80/50)) = ceil(4.8) = 5",
        options: [
          "Il double le nombre de replicas a chaque evaluation",
          "Il utilise la formule: desiredReplicas = ceil(currentReplicas * (currentMetricValue / targetValue)), clampee entre minReplicas et maxReplicas, avec une periode de stabilisation pour eviter le flapping",
          "Il ajoute toujours un replica a la fois pour etre conservateur",
          "Il se base uniquement sur la memoire, pas le CPU"
        ],
        answer: 1,
        explanation: "Le HPA echantillonne les metriques toutes les 15 secondes (par defaut), calcule le ratio current/target, et applique la formule proportionnelle. La stabilisation (default: 5 min pour scale down, 0 pour scale up) empeche le flapping. On peut combiner plusieurs metriques (CPU + custom metrics)."
      },
      {
        label: "Question 2 — Helm",
        text: "Quel est l'avantage principal de Helm par rapport a des manifests YAML bruts ?",
        code: "# values.yaml\nreplicaCount: 3\nimage:\n  repository: my-api\n  tag: v2.1.0\n\n# templates/deployment.yaml\napiVersion: apps/v1\nkind: Deployment\nspec:\n  replicas: {{ .Values.replicaCount }}\n  template:\n    spec:\n      containers:\n      - image: {{ .Values.image.repository }}:{{ .Values.image.tag }}\n\n# Override par environnement\nhelm upgrade api ./chart -f values-prod.yaml",
        options: [
          "Helm est plus rapide que kubectl apply",
          "Helm permet de templatiser les manifests avec des variables, de gerer les releases (install, upgrade, rollback), et de packager des applications complexes en charts reutilisables avec des values differentes par environnement",
          "Helm remplace completement kubectl",
          "Helm est necessaire pour deployer sur Kubernetes"
        ],
        answer: 1,
        explanation: "Helm resout trois problemes majeurs : le templating (un chart, N environnements), la gestion de releases (historique, rollback atomique), et le packaging (dependances entre charts, repository de charts partageables). C'est le gestionnaire de paquets de facto de Kubernetes."
      },
      {
        label: "Question 3 — Canary vs Blue-Green",
        text: "Quelle est la difference entre un deploiement canary et un deploiement blue-green ?",
        code: "# Blue-Green:\n# 1. Deployer v2 (green) a cote de v1 (blue)\n# 2. Tester green en interne\n# 3. Basculer TOUT le trafic de blue vers green\n# 4. Supprimer blue si OK\n\n# Canary:\n# 1. Deployer v2 sur un petit nombre de pods\n# 2. Router 5% du trafic vers v2\n# 3. Surveiller les metriques\n# 4. Augmenter progressivement: 5% -> 25% -> 50% -> 100%\n# 5. Rollback si erreurs detectees",
        options: [
          "Blue-Green est pour les petites applications, Canary pour les grandes",
          "Blue-Green bascule 100% du trafic d'un coup entre deux environnements identiques. Canary augmente progressivement le pourcentage de trafic vers la nouvelle version, permettant de detecter les problemes avant impact total",
          "Canary est plus ancien que Blue-Green",
          "Les deux strategies sont identiques avec des noms differents"
        ],
        answer: 1,
        explanation: "Blue-Green offre un rollback instantane (rebascule vers blue) mais necessite le double de resources. Canary est plus economique et permet de detecter les regressions sur un echantillon reel de trafic. En pratique, des outils comme Argo Rollouts ou Flagger automatisent les canary progressifs avec analyse de metriques."
      },
      {
        label: "Question 4 — Troubleshooting",
        text: "Un Pod est en status CrashLoopBackOff. Quelle est la bonne approche de diagnostic ?",
        code: "$ kubectl get pods\nNAME         READY   STATUS             RESTARTS   AGE\napi-abc123   0/1     CrashLoopBackOff   5          3m\n\n$ kubectl describe pod api-abc123\n# Voir Events, Last State, Exit Code\n\n$ kubectl logs api-abc123\n# Voir les derniers logs avant le crash\n\n$ kubectl logs api-abc123 --previous\n# Voir les logs du container precedent (avant restart)",
        options: [
          "Supprimer le Pod et en creer un nouveau",
          "Utiliser kubectl describe pour voir les events et l'exit code, puis kubectl logs --previous pour les logs du container crashe. L'exit code 137 = OOMKilled, 1 = erreur app, 0 = exit normal",
          "Redemarrer le cluster Kubernetes",
          "Augmenter les replicas dans le Deployment"
        ],
        answer: 1,
        explanation: "CrashLoopBackOff indique que le container crash puis Kubernetes le relance avec un backoff exponentiel (10s, 20s, 40s... max 5min). describe montre POURQUOI (exit code, OOM, image manquante). logs --previous montre les derniers logs du container crashe. Les exit codes courants : 137 (OOMKilled/SIGKILL), 143 (SIGTERM), 1 (erreur applicative)."
      },
      {
        label: "Question 5 — PodDisruptionBudget",
        text: "A quoi sert un PodDisruptionBudget (PDB) ?",
        code: "apiVersion: policy/v1\nkind: PodDisruptionBudget\nmetadata:\n  name: api-pdb\nspec:\n  minAvailable: 2\n  selector:\n    matchLabels:\n      app: api\n\n# Avec 3 replicas et minAvailable: 2\n# -> K8s ne peut evicter qu'1 pod a la fois\n# Utile lors de: node drain, cluster upgrade, scaling down",
        options: [
          "Limiter le nombre total de Pods dans le cluster",
          "Empecher les Pods de consommer trop de CPU",
          "Garantir un nombre minimum de Pods disponibles lors d'interruptions volontaires (node drain, cluster upgrade). Le PDB empeche K8s d'evicter trop de Pods simultanement",
          "Surveiller les metriques des Pods"
        ],
        answer: 2,
        explanation: "Le PDB protege contre les interruptions volontaires (administrateur, autoscaler, upgrades). Avec minAvailable: 2 et 3 replicas, K8s ne drainera qu'un node a la fois s'il contient des Pods de ce groupe. Il ne protege PAS contre les pannes involontaires (crash, OOM). Utiliser maxUnavailable: 1 est equivalent dans ce cas."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
