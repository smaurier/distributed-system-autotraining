<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 22 — Stream Processing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 22 — Stream Processing</h1>
    <p class="subtitle">Kafka, partitions, consumer groups, windowing, exactly-once et stream-table duality</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Kafka Partitions",
        text: "Pourquoi Kafka organise-t-il les topics en partitions et quel impact cela a-t-il sur l'ordre des messages ?",
        code: "// Topic 'orders' avec 3 partitions\n// Partition 0: [order-1, order-4, order-7, ...]\n// Partition 1: [order-2, order-5, order-8, ...]\n// Partition 2: [order-3, order-6, order-9, ...]\n\n// Ordre garanti DANS une partition\n// Pas d'ordre garanti ENTRE les partitions\n\n// Partition key: hash(userId) % 3\n// -> tous les messages d'un user dans la meme partition",
        options: [
          "Les partitions sont uniquement utilisees pour le chiffrement des messages",
          "Les partitions permettent le parallelisme (plusieurs consommateurs lisent en parallele) et garantissent l'ordre au sein d'une partition. La partition key permet de router les messages lies vers la meme partition",
          "Les partitions ralentissent Kafka mais sont obligatoires",
          "Les partitions sont des copies de sauvegarde des memes donnees"
        ],
        answer: 1,
        explanation: "Les partitions sont l'unite de parallelisme de Kafka. Chaque partition est un log ordonne et immutable. L'ordre n'est garanti qu'au sein d'une partition. La partition key (ex: userId) garantit que les messages correles sont dans la meme partition et donc ordonnes."
      },
      {
        label: "Question 2 — Consumer Groups",
        text: "Comment les consumer groups permettent-ils le scaling horizontal du traitement des messages ?",
        code: "// Topic 'events' avec 6 partitions\n// Consumer Group A (3 instances):\n//   Consumer A1: partitions 0, 1\n//   Consumer A2: partitions 2, 3\n//   Consumer A3: partitions 4, 5\n\n// Consumer Group B (2 instances):\n//   Consumer B1: partitions 0, 1, 2\n//   Consumer B2: partitions 3, 4, 5\n\n// Chaque groupe recoit TOUS les messages\n// Au sein d'un groupe, chaque partition = 1 seul consumer",
        options: [
          "Les consumer groups dupliquent les messages pour chaque consommateur",
          "Au sein d'un group, les partitions sont reparties entre les consumers (chaque partition assignee a un seul consumer). Ajouter des consumers repartit la charge. Differents groups recoivent independamment tous les messages",
          "Les consumer groups suppriment les messages apres lecture",
          "Les consumer groups ne fonctionnent qu'avec un seul consommateur"
        ],
        answer: 1,
        explanation: "Un consumer group permet le scale-out : chaque partition est consommee par exactement un membre du groupe. Ajouter un consumer redistribue les partitions (rebalancing). Differents groups (ex: service A et service B) consomment independamment le meme topic, chacun avec son propre offset."
      },
      {
        label: "Question 3 — Windowing",
        text: "Dans le stream processing, a quoi servent les fenetres temporelles (windows) et quel probleme le watermark resout-il ?",
        code: "// Tumbling window de 1 minute\n// [00:00-01:00] -> count = 42 events\n// [01:00-02:00] -> count = 38 events\n\n// Probleme: un event arrive a 01:05 avec\n// event_time = 00:58 (retard reseau)\n// -> dans quelle fenetre le placer ?\n\n// Watermark: \"tous les events avant 00:59 sont arrives\"\n// -> on peut fermer la fenetre [00:00-01:00]",
        options: [
          "Les fenetres servent a limiter l'utilisation memoire du broker Kafka",
          "Les fenetres regroupent les evenements par intervalles de temps pour les agregations. Le watermark indique jusqu'ou les evenements sont complets, permettant de fermer les fenetres malgre les retards reseau",
          "Les fenetres ne sont utilisees que pour l'affichage graphique",
          "Le watermark est un mecanisme de chiffrement des flux"
        ],
        answer: 1,
        explanation: "Les fenetres (tumbling, sliding, session) permettent les agregations temporelles sur des flux infinis. Le watermark est une heuristique qui estime la completude temporelle du flux : il permet au systeme de decider quand fermer une fenetre malgre les events en retard."
      },
      {
        label: "Question 4 — Exactly-Once Semantics",
        text: "Comment Kafka atteint-il l'exactly-once semantics (EOS) pour le traitement des messages ?",
        code: "// Kafka EOS = idempotent producer + transactions\n\n// 1. Idempotent producer:\n//    Chaque message a un (producerId, sequenceNumber)\n//    Le broker deduplique les messages identiques\n\n// 2. Transactions Kafka:\n//    producer.beginTransaction();\n//    producer.send(outputTopic, result);\n//    producer.sendOffsetsToTransaction(offsets);\n//    producer.commitTransaction();\n//    // Lecture + traitement + ecriture = atomique",
        options: [
          "Kafka garantit l'exactly-once en envoyant chaque message une seule fois sans aucun mecanisme special",
          "Kafka combine un producteur idempotent (deduplication par sequenceNumber) et des transactions atomiques (lecture des offsets + ecriture du resultat dans une seule transaction) pour atteindre l'EOS",
          "L'exactly-once est impossible et Kafka ne le propose pas",
          "Kafka utilise un protocole 2PC classique pour l'exactly-once"
        ],
        answer: 1,
        explanation: "L'EOS de Kafka repose sur deux mecanismes : le producteur idempotent (le broker deduplique via producerId + sequenceNumber) et les transactions (la consommation d'un offset et la production du resultat sont atomiques). Cela garantit un traitement exactly-once entre topics Kafka."
      },
      {
        label: "Question 5 — Stream-Table Duality",
        text: "Qu'est-ce que la dualite stream-table et comment s'applique-t-elle en pratique ?",
        code: "// Un stream est un log d'evenements (immutable, append-only)\n// stream: [SET user:1 name=Alice] [SET user:2 name=Bob]\n//         [SET user:1 name=Alicia]  // Alice change son nom\n\n// Une table est une vue materialisee du stream\n// table (a cet instant):\n// user:1 -> { name: 'Alicia' }\n// user:2 -> { name: 'Bob' }\n\n// Inversement, chaque changement dans une table\n// peut etre capture comme un stream (CDC)",
        options: [
          "La dualite signifie qu'un stream et une table sont exactement la meme chose",
          "Un stream peut etre materialise en table (en appliquant les events) et une table peut generer un stream de changements (CDC). Ce sont deux vues complementaires des memes donnees",
          "Les streams ne peuvent jamais etre convertis en tables",
          "La dualite stream-table est un concept uniquement theorique sans application pratique"
        ],
        answer: 1,
        explanation: "La dualite stream-table (Jay Kreps) est fondamentale : un stream agrege dans le temps donne une table (fold/reduce), et les changements d'une table forment un stream (Change Data Capture / CDC). Kafka Streams, ksqlDB et Flink exploitent cette dualite pour le traitement temps reel."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
