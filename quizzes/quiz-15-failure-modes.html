<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 15 — Failure Modes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 15 — Failure Modes</h1>
    <p class="subtitle">Pannes partielles, cascading failures, gray failures, fail-fast et blast radius</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Partial Failures",
        text: "Un service A appelle B qui appelle C. Le service C repond avec un timeout de 30s. B et A attendent chacun avec un timeout de 60s. Que se passe-t-il ?",
        code: null,
        options: [
          "Chaque service echoue immediatement grace au fail-fast",
          "Les threads de B et A restent bloques pendant 30s chacun, consommant des ressources et risquant un epuisement du pool de threads de A",
          "Le timeout de C est ignore car B a un timeout plus long",
          "La requete est automatiquement retransmise par le reseau"
        ],
        answer: 1,
        explanation: "C'est une panne partielle typique : C est lent, B attend, A attend B. Les timeouts s'accumulent et les threads restent bloques. Sans mecanisme de protection (circuit breaker, timeout agressif), cela peut provoquer un epuisement de ressources en cascade."
      },
      {
        label: "Question 2 — Cascading Failure",
        text: "Un cluster de 5 serveurs perd 1 noeud. Le trafic est redistribue sur les 4 restants, qui deviennent surcharges. Un 2e noeud tombe, puis un 3e... Quel pattern previent cette cascade ?",
        code: null,
        options: [
          "Augmenter le timeout pour laisser plus de temps aux serveurs surcharges",
          "Le load shedding : les serveurs restants rejettent activement le trafic excessif plutot que d'essayer de tout traiter",
          "Ajouter plus de RAM a chaque serveur",
          "Utiliser un cache DNS pour reduire les requetes"
        ],
        answer: 1,
        explanation: "Le load shedding permet a chaque serveur de rejeter volontairement une partie du trafic quand il approche de sa capacite maximale. Mieux vaut servir 80% des requetes correctement que de tomber en essayant de servir 100%."
      },
      {
        label: "Question 3 — Gray Failures",
        text: "Un serveur repond aux health checks avec HTTP 200, mais ses reponses metier arrivent avec 5s de latence au lieu de 200ms habituels. Quel type de panne est-ce ?",
        code: "// Health check endpoint\napp.get('/health', (req, res) => {\n  res.status(200).json({ status: 'ok' });\n});\n\n// Mais les requetes metier...\n// GET /api/orders -> 5200ms (au lieu de 200ms)",
        options: [
          "Une panne totale (crash failure)",
          "Une panne byzantine",
          "Une gray failure : le systeme est partiellement defaillant mais les mecanismes de detection ne le voient pas",
          "Un fonctionnement normal sous charge"
        ],
        answer: 2,
        explanation: "Les gray failures sont des pannes subtiles ou un composant semble sain (health check OK) mais fonctionne de maniere degradee. Elles sont dangereuses car le load balancer continue d'envoyer du trafic vers ce noeud. Des health checks plus sophistiques (deep health checks) sont necessaires."
      },
      {
        label: "Question 4 — Fail-Fast",
        text: "Pourquoi ce code applique-t-il le principe fail-fast ?",
        code: "async function processOrder(order) {\n  // Validation immediate avant tout traitement couteux\n  if (!order.customerId) throw new ValidationError('Missing customerId');\n  if (!order.items?.length) throw new ValidationError('Empty order');\n  if (order.total <= 0) throw new ValidationError('Invalid total');\n\n  // Verification des dependances critiques\n  if (!await inventoryService.isAvailable()) {\n    throw new ServiceUnavailableError('Inventory service down');\n  }\n\n  // Traitement couteux seulement si tout est OK\n  await paymentService.charge(order);\n  await shippingService.schedule(order);\n}",
        options: [
          "Parce qu'il utilise async/await",
          "Parce qu'il echoue immediatement sur les conditions invalides avant d'engager des operations couteuses ou irrecoverables",
          "Parce qu'il appelle plusieurs services en sequence",
          "Parce qu'il lance des exceptions personnalisees"
        ],
        answer: 1,
        explanation: "Le fail-fast valide les preconditions le plus tot possible. Ici, on verifie la validite des donnees et la disponibilite des dependances AVANT d'appeler le service de paiement. Cela evite de gaspiller des ressources et simplifie la gestion des erreurs."
      },
      {
        label: "Question 5 — Blast Radius",
        text: "Une equipe deploie un changement de schema de base de donnees qui corrompt les donnees. Tous les microservices partagent la meme base de donnees. Quelle decision architecturale a maximise le blast radius ?",
        code: null,
        options: [
          "L'utilisation de microservices plutot qu'un monolithe",
          "Le partage d'une base de donnees unique entre tous les services, violant le principe de database-per-service",
          "L'utilisation d'un load balancer devant les services",
          "Le deploiement sur un seul cloud provider"
        ],
        answer: 1,
        explanation: "Partager une base de donnees entre services cree un couplage fort et maximise le blast radius : un probleme sur la base impacte TOUS les services. Le pattern database-per-service isole les pannes : un schema corrompu n'impacte que son service proprietaire."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
