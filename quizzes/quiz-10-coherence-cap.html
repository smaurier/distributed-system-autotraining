<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 10 — Coherence & CAP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 10 — Coherence & CAP</h1>
    <p class="subtitle">Theoreme CAP, modeles de coherence, PACELC, quorums et eventual consistency</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Theoreme CAP",
        text: "Que stipule le theoreme CAP pour un systeme distribue en presence d'une partition reseau ?",
        code: null,
        options: [
          "On peut toujours avoir Consistency, Availability et Partition tolerance simultanement",
          "En cas de partition reseau (P), le systeme doit choisir entre Consistency (C) et Availability (A) — il ne peut pas garantir les deux",
          "CAP signifie qu'un systeme distribue ne peut jamais etre coherent",
          "Le theoreme CAP ne s'applique qu'aux bases de donnees relationnelles"
        ],
        answer: 1,
        explanation: "Le theoreme CAP (Brewer, 2000) stipule qu'en cas de partition reseau — inevitable dans un systeme distribue — il faut choisir : CP (coherence forte, on refuse les requetes sur les noeuds isoles) ou AP (disponibilite, on accepte des lectures potentiellement obsoletes)."
      },
      {
        label: "Question 2 — Modeles de coherence",
        text: "Quelle est la difference entre strong consistency et eventual consistency ?",
        code: "// Strong consistency (CP)\n// Client A ecrit x = 42\n// Client B lit x -> toujours 42 (apres ack de l'ecriture)\n\n// Eventual consistency (AP)\n// Client A ecrit x = 42\n// Client B lit x -> peut lire l'ancienne valeur temporairement\n// ... apres un delai de propagation ...\n// Client B lit x -> 42 (finalement coherent)",
        options: [
          "Strong consistency est plus rapide que eventual consistency",
          "Strong consistency garantit que toute lecture apres une ecriture confirmee retourne la derniere valeur. Eventual consistency garantit la convergence a terme mais tolere des lectures obsoletes temporaires",
          "Eventual consistency ne garantit jamais la coherence",
          "Strong consistency ne fonctionne que sur un seul serveur"
        ],
        answer: 1,
        explanation: "Strong consistency (linearizability) donne l'illusion d'une seule copie des donnees : toute lecture voit la derniere ecriture. Eventual consistency accepte un delai de propagation ou les replicas divergent, mais convergent a terme. Le choix depend du use case."
      },
      {
        label: "Question 3 — PACELC",
        text: "Que rajoute le modele PACELC par rapport au theoreme CAP ?",
        code: null,
        options: [
          "PACELC ajoute le chiffrement comme quatrieme propriete",
          "PACELC precise que meme en l'absence de partition (Else), il faut choisir entre Latency et Consistency",
          "PACELC elimine le besoin de partitions reseau",
          "PACELC est un remplacement complet du theoreme CAP qui le rend obsolete"
        ],
        answer: 1,
        explanation: "PACELC etend CAP : en cas de Partition, choisir A ou C (comme CAP). Sinon (Else), choisir entre Latency (L) et Consistency (C). Ex: DynamoDB est PA/EL (disponible et rapide), PostgreSQL avec replication synchrone est PC/EC (coherent mais plus lent)."
      },
      {
        label: "Question 4 — Quorum (W+R>N)",
        text: "Dans un cluster de 5 noeuds (N=5), avec W=3 et R=3, pourquoi la condition W+R>N garantit-elle la coherence des lectures ?",
        code: "// N=5 noeuds, W=3 (write quorum), R=3 (read quorum)\n// W + R = 6 > 5 = N\n\n// Ecriture: confirmee apres 3 acks sur 5\n// Noeuds avec nouvelle valeur: {A, B, C}\n// Noeuds potentiellement obsoletes: {D, E}\n\n// Lecture: interroge 3 noeuds\n// Au moins 1 noeud aura la derniere valeur\n// car intersection({A,B,C}, 3 parmi {A,B,C,D,E}) != vide",
        options: [
          "Parce que 3+3=6 est un nombre pair, ce qui est plus performant",
          "Parce que l'intersection entre les ensembles d'ecriture et de lecture est toujours non vide : au moins un noeud lu possede la derniere valeur",
          "Parce que W=3 signifie que l'ecriture est toujours plus rapide",
          "La condition W+R>N n'a aucun rapport avec la coherence"
        ],
        answer: 1,
        explanation: "Si W noeuds ont ecrit et qu'on lit R noeuds, avec W+R>N, les deux ensembles se chevauchent forcement (principe des tiroirs). On est donc certain qu'au moins un noeud lu possede la derniere version. On retourne la valeur avec le timestamp le plus recent."
      },
      {
        label: "Question 5 — Eventual Consistency en pratique",
        text: "Dans quel scenario l'eventual consistency est-elle un choix acceptable et meme preferable ?",
        code: null,
        options: [
          "Pour un systeme de transfert bancaire entre comptes",
          "Pour un compteur de 'likes' sur un reseau social ou une legere imprecision temporaire est acceptable et la haute disponibilite est prioritaire",
          "Pour un systeme de reservation de places d'avion avec contrainte d'unicite",
          "Pour un registre medical ou une lecture obsolete pourrait mettre en danger un patient"
        ],
        answer: 1,
        explanation: "Un compteur de likes tolere une imprecision temporaire (afficher 1042 au lieu de 1043 pendant quelques secondes). L'eventual consistency permet ici une haute disponibilite et une faible latence. En revanche, les transferts bancaires ou reservations avec contraintes necessitent une coherence forte."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
