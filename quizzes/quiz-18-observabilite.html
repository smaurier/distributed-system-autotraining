<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 18 — Observabilite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 18 — Observabilite</h1>
    <p class="subtitle">Correlation IDs, health checks, distributed tracing et metriques RED</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Correlation ID",
        text: "Pourquoi le correlation ID est-il propage dans les headers entre microservices ?",
        code: "// Service A (API Gateway)\napp.use((req, res, next) => {\n  req.correlationId = req.headers['x-correlation-id']\n    || crypto.randomUUID();\n  res.setHeader('x-correlation-id', req.correlationId);\n  next();\n});\n\n// Appel vers Service B\nawait fetch('http://service-b/api', {\n  headers: {\n    'x-correlation-id': req.correlationId\n  }\n});",
        options: [
          "Pour authentifier les requetes entre services",
          "Pour permettre de tracer et correler tous les logs et appels d'une meme requete utilisateur a travers l'ensemble des microservices",
          "Pour mesurer la latence du reseau",
          "Pour garantir l'idempotence des requetes"
        ],
        answer: 1,
        explanation: "Le correlation ID est un identifiant unique genere au point d'entree qui traverse tous les services impliques dans le traitement d'une requete. En cherchant ce ID dans les logs centralises, on peut reconstruire le parcours complet d'une requete a travers le systeme."
      },
      {
        label: "Question 2 — Distributed Tracing",
        text: "Dans un trace distribue, quelle est la difference entre un trace et un span ?",
        code: "Trace: abc-123\n├── Span 1: API Gateway      [0ms -------- 250ms]\n│   ├── Span 2: Auth Service  [10ms -- 50ms]\n│   └── Span 3: Order Service [55ms -------- 240ms]\n│       ├── Span 4: DB Query   [60ms - 100ms]\n│       └── Span 5: Payment    [105ms --- 230ms]",
        options: [
          "Un trace est un log et un span est une metrique",
          "Un trace represente le parcours complet d'une requete, compose de plusieurs spans qui representent chacun une unite de travail individuelle dans un service",
          "Un span est plus long qu'un trace",
          "Un trace et un span sont la meme chose avec des noms differents"
        ],
        answer: 1,
        explanation: "Un trace est l'arbre complet d'une requete de bout en bout. Chaque span represente une operation individuelle (appel HTTP, requete DB, etc.) avec un debut, une fin et des metadonnees. Les spans sont lies entre eux par des relations parent-enfant formant le trace."
      },
      {
        label: "Question 3 — RED Metrics",
        text: "Que represente l'acronyme RED dans les metriques RED pour les microservices ?",
        code: "// Dashboard Grafana pour le service Orders\n// R: ???\n// E: ???\n// D: ???",
        options: [
          "Reliability, Efficiency, Durability",
          "Rate (requetes/seconde), Errors (taux d'erreurs), Duration (latence des requetes)",
          "Reads, Events, Deletes",
          "Requests, Endpoints, Databases"
        ],
        answer: 1,
        explanation: "RED signifie Rate (debit de requetes), Errors (pourcentage de requetes en erreur) et Duration (distribution de la latence, souvent en percentiles p50, p95, p99). C'est le standard pour monitorer les services request-driven, complementaire de USE (Utilization, Saturation, Errors) pour les ressources."
      },
      {
        label: "Question 4 — Health Checks",
        text: "Quelle est la difference entre un liveness check et un readiness check dans Kubernetes ?",
        code: "# Kubernetes Pod spec\nlivenessProbe:\n  httpGet:\n    path: /healthz\n    port: 8080\n  initialDelaySeconds: 15\n  periodSeconds: 10\n\nreadinessProbe:\n  httpGet:\n    path: /ready\n    port: 8080\n  initialDelaySeconds: 5\n  periodSeconds: 5",
        options: [
          "Ils sont identiques, seul le nom change",
          "Le liveness check verifie si le processus est vivant (sinon Kubernetes le redemarrera), le readiness check verifie si le service est pret a recevoir du trafic (sinon il est retire du load balancer)",
          "Le liveness check est pour la base de donnees et le readiness check pour l'application",
          "Le readiness check est execute une seule fois au demarrage"
        ],
        answer: 1,
        explanation: "Liveness = 'est-ce que le processus est bloque ?' (si fail → restart du pod). Readiness = 'est-ce que le service peut traiter des requetes ?' (si fail → retire du Service/load balancer mais pas redemarrage). Un service peut etre alive mais pas ready (ex: pendant le chargement d'un cache)."
      },
      {
        label: "Question 5 — Structured Logging",
        text: "Pourquoi les logs structures (JSON) sont-ils preferables aux logs textuels en systemes distribues ?",
        code: "// Log textuel\nconsole.log(`[2024-03-08 14:30:00] ERROR - Order 123\n  failed for user 456: payment timeout`);\n\n// Log structure\nlogger.error({\n  timestamp: '2024-03-08T14:30:00Z',\n  level: 'error',\n  service: 'order-service',\n  correlationId: 'abc-789',\n  orderId: '123',\n  userId: '456',\n  error: 'payment_timeout',\n  duration_ms: 30000\n});",
        options: [
          "Les logs JSON sont plus lisibles pour les humains",
          "Les logs structures occupent moins d'espace disque",
          "Les logs structures permettent l'indexation, le filtrage et l'agregation automatique par des outils (ELK, Datadog) sans parsing regex fragile",
          "Les logs textuels ne sont pas supportes par les conteneurs Docker"
        ],
        answer: 2,
        explanation: "Les logs structures avec des champs nommes permettent aux outils de log management d'indexer automatiquement chaque champ. On peut filtrer par service, correlationId, niveau d'erreur, etc. Les logs textuels necessitent du parsing regex qui casse facilement quand le format change."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
