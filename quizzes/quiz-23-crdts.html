<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 23 — CRDTs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 23 — CRDTs</h1>
    <p class="subtitle">G-Counter, PN-Counter, LWW-Register, OR-Set et proprietes de convergence</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — G-Counter",
        text: "Comment fonctionne un G-Counter (Grow-only Counter) et quelle est sa valeur apres la fusion (merge) ?",
        code: "// G-Counter: chaque noeud incremente son propre compteur\n// Noeud A: {A: 3, B: 0, C: 0}  // A a incremente 3 fois\n// Noeud B: {A: 1, B: 5, C: 0}  // B a vu A=1, B a incremente 5 fois\n// Noeud C: {A: 2, B: 2, C: 4}  // C a vu A=2, B=2, C a incremente 4 fois\n\n// Merge = max composante par composante\n// merge = {A: max(3,1,2), B: max(0,5,2), C: max(0,0,4)}\n// merge = {A: 3, B: 5, C: 4}\n// value = 3 + 5 + 4 = ?",
        options: [
          "La valeur est 12 car le merge fait la somme de toutes les valeurs",
          "La valeur est 12 car le merge prend le max par noeud puis somme : max(3,1,2) + max(0,5,2) + max(0,0,4) = 3 + 5 + 4 = 12",
          "La valeur est 17 car on somme tous les compteurs de tous les replicas",
          "La valeur est 5 car on prend uniquement la valeur maximale"
        ],
        answer: 1,
        explanation: "Le G-Counter attribue un compteur local par noeud. Le merge prend le max composante par composante (fonction de join du semi-treillis). La valeur totale est la somme des composantes fusionnees. Cette structure est commutative, associative et idempotente."
      },
      {
        label: "Question 2 — PN-Counter",
        text: "Pourquoi un G-Counter ne suffit-il pas pour modeliser un compteur qui peut etre decremente, et comment le PN-Counter resout-il ce probleme ?",
        code: "// PN-Counter = deux G-Counters\n// P (positive / increments)\n// N (negative / decrements)\n\n// Noeud A incremente 5 fois, decremente 2 fois:\n// P = {A: 5, B: 0}\n// N = {A: 2, B: 0}\n\n// Noeud B incremente 3 fois, decremente 1 fois:\n// P = {A: 0, B: 3}\n// N = {A: 0, B: 1}\n\n// Valeur = sum(P) - sum(N) = (5+3) - (2+1) = 5",
        options: [
          "Le G-Counter peut deja decrementer en utilisant des nombres negatifs",
          "Le G-Counter est grow-only (monotone croissant). Le PN-Counter utilise deux G-Counters (P pour les increments, N pour les decrements) et la valeur est P - N, permettant des decrements tout en restant un CRDT valide",
          "Le PN-Counter remplace les decrements par des resets",
          "Il suffit de soustraire directement du G-Counter"
        ],
        answer: 1,
        explanation: "Un G-Counter est monotone croissant — impossible de decrementer. Le PN-Counter decompose le probleme : P compte les increments, N compte les decrements. La valeur observable est sum(P) - sum(N). Les deux G-Counters se mergent independamment, preservant les proprietes CRDT."
      },
      {
        label: "Question 3 — LWW-Register",
        text: "Comment le LWW-Register (Last-Writer-Wins Register) resout-il les ecritures concurrentes, et quel est son inconvenient ?",
        code: "// LWW-Register: la valeur avec le timestamp le plus recent gagne\n\n// Noeud A ecrit: { value: 'Paris', timestamp: 100 }\n// Noeud B ecrit: { value: 'Lyon',  timestamp: 102 }\n// (ecritures concurrentes)\n\n// Merge: timestamp 102 > 100 -> 'Lyon' gagne\n// Resultat final sur tous les noeuds: 'Lyon'",
        options: [
          "Le LWW-Register garde les deux valeurs et laisse l'utilisateur choisir",
          "Le LWW-Register conserve la valeur avec le timestamp le plus recent. C'est simple et convergent, mais il peut perdre silencieusement des ecritures concurrentes (la valeur 'Paris' est perdue sans notification)",
          "Le LWW-Register fusionne les deux valeurs en une seule chaine",
          "Le LWW-Register refuse les ecritures concurrentes et retourne une erreur"
        ],
        answer: 1,
        explanation: "Le LWW-Register est le CRDT le plus simple pour un registre : le timestamp le plus recent l'emporte. Il converge toujours mais au prix de data loss silencieux : les ecritures concurrentes 'perdantes' disparaissent. Pour les cas ou la perte est inacceptable, on prefere un MV-Register ou OR-Set."
      },
      {
        label: "Question 4 — OR-Set",
        text: "Quel probleme l'OR-Set (Observed-Remove Set) resout-il que les ensembles distribues naifs ne gerent pas ?",
        code: "// Probleme avec un Set naif:\n// Noeud A ajoute 'x': {x}\n// Noeud B ajoute 'x': {x}\n// Noeud A supprime 'x': {}\n// Merge de A={} et B={x} -> {x} ?! x revient !\n\n// OR-Set: chaque ajout a un tag unique\n// A.add('x'): {(x, tag1)}\n// B.add('x'): {(x, tag2)}\n// A.remove('x'): retire tag1 -> {}\n// Merge: {(x, tag2)} car tag2 n'a pas ete retire\n// -> x reste car B l'a ajoute independamment",
        options: [
          "L'OR-Set est identique a un HashSet classique",
          "L'OR-Set associe un tag unique a chaque ajout. La suppression retire uniquement les tags observes localement. Si un autre noeud a ajoute le meme element avec un tag different (concurrent), l'element survit apres le merge — 'add wins' sur les ajouts concurrents",
          "L'OR-Set interdit les suppressions",
          "L'OR-Set supprime definitivement un element de tous les replicas instantanement"
        ],
        answer: 1,
        explanation: "Dans un ensemble naif, add et remove concurrents creent un conflit. L'OR-Set resout cela avec des tags uniques par ajout. Un remove ne supprime que les tags qu'il a observes. Un ajout concurrent (tag different) survit. La semantique est 'add-wins' : en cas de conflit concurrent add/remove, l'ajout l'emporte."
      },
      {
        label: "Question 5 — Proprietes de convergence",
        text: "Quelle propriete mathematique garantit qu'un CRDT converge automatiquement sans coordination ?",
        code: "// CRDT = type de donnees dont le merge forme\n// un semi-treillis (join semilattice)\n\n// Proprietes du merge:\n// 1. Commutatif: merge(a, b) = merge(b, a)\n// 2. Associatif: merge(merge(a, b), c) = merge(a, merge(b, c))\n// 3. Idempotent: merge(a, a) = a",
        options: [
          "Les CRDTs convergent car ils utilisent des transactions ACID",
          "La fonction merge est commutative, associative et idempotente (semi-treillis), garantissant que quel que soit l'ordre ou la repetition des merges, tous les replicas convergent vers le meme etat sans coordination",
          "Les CRDTs utilisent un leader central pour decider de la valeur finale",
          "La convergence est assuree par un protocole de consensus comme Raft"
        ],
        answer: 1,
        explanation: "Les CRDTs exploitent les proprietes mathematiques du semi-treillis : commutativite (l'ordre des merges n'importe pas), associativite (le groupement n'importe pas), idempotence (merger le meme etat plusieurs fois est sans effet). Ces trois proprietes garantissent la convergence forte (SEC) sans coordination."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
