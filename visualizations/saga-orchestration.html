<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saga - Choreography vs Orchestration</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
  h1{text-align:center;padding:18px;color:#00d4ff;font-size:1.5rem;text-shadow:0 0 12px rgba(0,212,255,.3)}
  .container{display:flex;flex-wrap:wrap;gap:16px;padding:0 20px 20px;max-width:1500px;margin:0 auto}
  .panel{background:#16213e;border-radius:12px;padding:16px;border:1px solid #0f3460;flex:1 1 440px}
  .panel h2{color:#ffa500;font-size:1.1rem;margin-bottom:12px;text-align:center}
  .controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 20px 16px;max-width:1500px;margin:0 auto}
  .btn{background:#0f3460;color:#00d4ff;border:1px solid #00d4ff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s}
  .btn:hover{background:#00d4ff;color:#1a1a2e}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.danger{border-color:#ff4444;color:#ff4444}
  .btn.danger:hover{background:#ff4444;color:#fff}
  select{background:#0f3460;color:#00d4ff;border:1px solid #00d4ff;padding:8px 12px;border-radius:8px;font-size:.85rem}
  svg.saga-svg{width:100%;height:380px}
  .svc-box{rx:8;ry:8;stroke-width:2;transition:all .4s}
  .svc-label{font-size:12px;fill:#e0e0e0;text-anchor:middle;pointer-events:none}
  .arrow-line{stroke-width:2;fill:none;marker-end:url(#arrowhead)}
  .msg-label{font-size:10px;fill:#888;text-anchor:middle}
  .timeline{background:#1a1a2e;border-radius:8px;padding:12px;max-width:1500px;margin:0 auto 20px;border:1px solid #0f3460}
  .timeline h3{color:#ffa500;font-size:.9rem;margin-bottom:8px;padding:0 8px}
  .tl-events{display:flex;flex-wrap:wrap;gap:4px;padding:0 8px;max-height:100px;overflow-y:auto}
  .tl-evt{font-size:.72rem;padding:4px 8px;border-radius:4px;white-space:nowrap}
  .tl-evt.success{background:#00b89433;color:#00b894;border:1px solid #00b894}
  .tl-evt.fail{background:#ff444433;color:#ff4444;border:1px solid #ff4444}
  .tl-evt.comp{background:#ffa50033;color:#ffa500;border:1px solid #ffa500}
  @keyframes msgMove{0%{opacity:1}100%{opacity:1}}
  .msg-dot{r:4;transition:all .1s}
  .coord-box{fill:#6c5ce7;fill-opacity:.2;stroke:#6c5ce7;rx:8;ry:8}
  .coord-label{fill:#6c5ce7;font-size:11px;text-anchor:middle}
</style>
</head>
<body>
<h1>Saga : Choreographie vs Orchestration</h1>
<div class="controls">
  <button class="btn" id="btnStart" onclick="startSaga()">Demarrer Saga</button>
  <button class="btn" id="btnStep" onclick="nextStep()" disabled>Etape suivante</button>
  <label style="color:#888;font-size:.85rem;display:flex;align-items:center;gap:6px">
    Echec a l'etape :
    <select id="failAt">
      <option value="-1">Aucun</option>
      <option value="1">1 - Creer Commande</option>
      <option value="2">2 - Reserver Stock</option>
      <option value="3">3 - Traiter Paiement</option>
      <option value="4">4 - Envoyer Notification</option>
    </select>
  </label>
  <button class="btn danger" onclick="resetSaga()">Reinitialiser</button>
</div>
<div class="container">
  <div class="panel">
    <h2>Choreographie (Evenements)</h2>
    <svg class="saga-svg" id="choreoSvg"></svg>
  </div>
  <div class="panel">
    <h2>Orchestration (Coordinateur)</h2>
    <svg class="saga-svg" id="orchSvg"></svg>
  </div>
</div>
<div class="timeline">
  <h3>Chronologie des evenements</h3>
  <div class="tl-events" id="tlEvents"></div>
</div>
<script>
const SVG_NS='http://www.w3.org/2000/svg';
const steps=[
  {name:'Creer Commande',svc:'Commandes',comp:'Annuler Commande'},
  {name:'Reserver Stock',svc:'Stock',comp:'Liberer Stock'},
  {name:'Traiter Paiement',svc:'Paiement',comp:'Rembourser'},
  {name:'Envoyer Notification',svc:'Notification',comp:'—'}
];
const colors={pending:'#0f3460',active:'#00d4ff',success:'#00b894',fail:'#ff4444',comp:'#ffa500'};
let currentStep=-1,failStep=-1,phase='idle',compensateIdx=-1,stepMode=true;

function setupSvg(svgId,isOrch){
  const svg=document.getElementById(svgId);
  const W=460,H=370;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML='';
  // defs
  const defs=document.createElementNS(SVG_NS,'defs');
  ['#00d4ff','#ff4444','#ffa500','#00b894','#6c5ce7'].forEach(c=>{
    const m=document.createElementNS(SVG_NS,'marker');
    m.setAttribute('id',`ah-${svgId}-${c.slice(1)}`);
    m.setAttribute('markerWidth','8');m.setAttribute('markerHeight','6');
    m.setAttribute('refX','8');m.setAttribute('refY','3');m.setAttribute('orient','auto');
    const p=document.createElementNS(SVG_NS,'polygon');
    p.setAttribute('points','0 0, 8 3, 0 6');p.setAttribute('fill',c);
    m.appendChild(p);defs.appendChild(m);
  });
  svg.appendChild(defs);

  const boxW=90,boxH=50,gap=20;
  const startY=isOrch?100:60;
  const totalW=steps.length*(boxW+gap)-gap;
  const offsetX=(W-totalW)/2;

  if(isOrch){
    // coordinator
    const cr=document.createElementNS(SVG_NS,'rect');
    cr.setAttribute('x',W/2-60);cr.setAttribute('y',20);cr.setAttribute('width',120);cr.setAttribute('height',40);
    cr.classList.add('coord-box');svg.appendChild(cr);
    const cl=document.createElementNS(SVG_NS,'text');
    cl.setAttribute('x',W/2);cl.setAttribute('y',45);cl.classList.add('coord-label');
    cl.textContent='Orchestrateur';svg.appendChild(cl);
  }

  steps.forEach((s,i)=>{
    const x=offsetX+i*(boxW+gap), y=startY;
    const r=document.createElementNS(SVG_NS,'rect');
    r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',boxW);r.setAttribute('height',boxH);
    r.classList.add('svc-box');
    r.setAttribute('fill',colors.pending+'44');r.setAttribute('stroke',colors.pending);
    r.id=`${svgId}-box-${i}`;
    svg.appendChild(r);
    const t=document.createElementNS(SVG_NS,'text');
    t.setAttribute('x',x+boxW/2);t.setAttribute('y',y+boxH/2+4);
    t.classList.add('svc-label');t.textContent=s.svc;
    svg.appendChild(t);
    // step number
    const sn=document.createElementNS(SVG_NS,'text');
    sn.setAttribute('x',x+boxW/2);sn.setAttribute('y',y-8);
    sn.setAttribute('fill','#888');sn.setAttribute('font-size','11');sn.setAttribute('text-anchor','middle');
    sn.textContent=`Etape ${i+1}`;
    svg.appendChild(sn);
    // arrows between steps
    if(i<steps.length-1){
      const ax=x+boxW,ay=y+boxH/2;
      const bx=x+boxW+gap,by=ay;
      if(!isOrch){
        const line=document.createElementNS(SVG_NS,'line');
        line.setAttribute('x1',ax);line.setAttribute('y1',ay);
        line.setAttribute('x2',bx-2);line.setAttribute('y2',by);
        line.setAttribute('stroke',colors.pending);line.setAttribute('stroke-width',2);
        line.setAttribute('marker-end',`url(#ah-${svgId}-0f3460)`);
        line.id=`${svgId}-arrow-${i}`;
        svg.appendChild(line);
      }
    }
    if(isOrch){
      // arrows from coordinator to service
      const line=document.createElementNS(SVG_NS,'line');
      line.setAttribute('x1',W/2);line.setAttribute('y1',60);
      line.setAttribute('x2',x+boxW/2);line.setAttribute('y2',y-2);
      line.setAttribute('stroke',colors.pending);line.setAttribute('stroke-width',1.5);
      line.setAttribute('stroke-dasharray','4 3');
      line.id=`${svgId}-orch-${i}`;
      svg.appendChild(line);
    }
    // status text
    const st=document.createElementNS(SVG_NS,'text');
    st.setAttribute('x',x+boxW/2);st.setAttribute('y',y+boxH+18);
    st.setAttribute('fill','#888');st.setAttribute('font-size','10');st.setAttribute('text-anchor','middle');
    st.id=`${svgId}-status-${i}`;
    svg.appendChild(st);
  });
}

function setBoxState(svgId,idx,state,statusText){
  const box=document.getElementById(`${svgId}-box-${idx}`);
  if(!box) return;
  const c=colors[state]||colors.pending;
  box.setAttribute('fill',c+'33');box.setAttribute('stroke',c);
  const st=document.getElementById(`${svgId}-status-${idx}`);
  if(st){st.textContent=statusText||'';st.setAttribute('fill',c);}
  if(svgId.includes('orch')){
    const ol=document.getElementById(`${svgId}-orch-${idx}`);
    if(ol) ol.setAttribute('stroke',c);
  }
  if(!svgId.includes('orch')){
    const ar=document.getElementById(`${svgId}-arrow-${idx}`);
    if(ar) ar.setAttribute('stroke',c);
  }
}

function addTimelineEvent(text,type){
  const el=document.createElement('span');
  el.className='tl-evt '+type;
  el.textContent=text;
  document.getElementById('tlEvents').appendChild(el);
}

function startSaga(){
  resetSaga();
  failStep=+document.getElementById('failAt').value;
  phase='forward';currentStep=-1;
  document.getElementById('btnStep').disabled=false;
  document.getElementById('btnStart').disabled=true;
  nextStep();
}

function nextStep(){
  if(phase==='forward'){
    currentStep++;
    if(currentStep>=steps.length){phase='done';finish();return;}
    const s=steps[currentStep];
    const willFail=(currentStep+1)===failStep;
    setTimeout(()=>{
      if(willFail){
        setBoxState('choreoSvg',currentStep,'fail','Echec');
        setBoxState('orchSvg',currentStep,'fail','Echec');
        addTimelineEvent(`${s.name} - ECHEC`,'fail');
        phase='compensate';compensateIdx=currentStep-1;
        if(compensateIdx<0){phase='done';finish();}
      } else {
        setBoxState('choreoSvg',currentStep,'success','OK');
        setBoxState('orchSvg',currentStep,'success','OK');
        addTimelineEvent(`${s.name} - OK`,'success');
      }
    },100);
  } else if(phase==='compensate'){
    if(compensateIdx<0){phase='done';finish();return;}
    const s=steps[compensateIdx];
    setBoxState('choreoSvg',compensateIdx,'comp',s.comp);
    setBoxState('orchSvg',compensateIdx,'comp',s.comp);
    addTimelineEvent(`Compensation: ${s.comp}`,'comp');
    compensateIdx--;
    if(compensateIdx<0){
      setTimeout(()=>{phase='done';finish();},200);
    }
  }
}

function finish(){
  document.getElementById('btnStep').disabled=true;
  const msg=failStep>0?'Saga echouee - compensations terminees':'Saga terminee avec succes';
  addTimelineEvent(msg,failStep>0?'fail':'success');
}

function resetSaga(){
  currentStep=-1;phase='idle';compensateIdx=-1;
  document.getElementById('tlEvents').innerHTML='';
  document.getElementById('btnStep').disabled=true;
  document.getElementById('btnStart').disabled=false;
  setupSvg('choreoSvg',false);
  setupSvg('orchSvg',true);
}

resetSaga();
</script>
</body>
</html>
