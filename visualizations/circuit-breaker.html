<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit Breaker - Machine a etats</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; min-height: 100vh; }
  h1 { text-align: center; padding: 18px 0 6px; font-size: 1.5rem; color: #c9d1d9; letter-spacing: 1px; }
  .layout { display: flex; flex-wrap: wrap; gap: 14px; padding: 10px 18px; max-width: 1200px; margin: 0 auto; }
  .svg-panel { flex: 1 1 600px; background: #16213e; border-radius: 12px; padding: 10px; min-height: 340px; }
  .controls { flex: 0 0 300px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: #16213e; border-radius: 10px; padding: 14px; }
  .card h3 { font-size: .95rem; margin-bottom: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; }
  button { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: .85rem; transition: background .2s; width: 100%; margin-bottom: 6px; }
  button:hover { filter: brightness(1.15); }
  button.fail { background: #dc3545; }
  label { font-size: .82rem; color: #8b949e; display: block; margin-bottom: 2px; }
  input[type=range] { width: 100%; accent-color: #4dabf7; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .stat { background: #0d1117; border-radius: 6px; padding: 8px; text-align: center; }
  .stat .val { font-size: 1.3rem; font-weight: 700; color: #58a6ff; }
  .stat .lbl { font-size: .7rem; color: #8b949e; }
  .log-panel { max-width: 1200px; margin: 10px auto; padding: 0 18px; }
  .log-panel .card { max-height: 200px; overflow-y: auto; }
  .log-entry { font-size: .78rem; padding: 3px 6px; border-bottom: 1px solid #21262d; display: flex; gap: 8px; }
  .log-entry .time { color: #8b949e; min-width: 55px; }
  .log-entry .state-tag { padding: 1px 6px; border-radius: 4px; font-size: .72rem; font-weight: 600; }
  .tag-closed { background: #238636; color: #fff; }
  .tag-open { background: #dc3545; color: #fff; }
  .tag-half { background: #ffc107; color: #000; }
  .countdown { text-align: center; font-size: 1.1rem; color: #ffc107; margin-top: 6px; min-height: 24px; }
  svg text { font-family: 'Segoe UI', Tahoma, sans-serif; }
  .glow-green { filter: drop-shadow(0 0 12px #238636); }
  .glow-red { filter: drop-shadow(0 0 12px #dc3545); }
  .glow-yellow { filter: drop-shadow(0 0 12px #ffc107); }
  .arrow-anim { stroke-dasharray: 8 4; animation: dash .6s linear infinite; }
  @keyframes dash { to { stroke-dashoffset: -12; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  .pulse { animation: pulse 1s ease-in-out infinite; }
</style>
</head>
<body>
<h1>Circuit Breaker &mdash; Machine a etats interactive</h1>
<div class="layout">
  <div class="svg-panel">
    <svg id="svg" viewBox="0 0 620 340" width="100%">
      <defs>
        <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/></marker>
      </defs>
      <!-- Arrows -->
      <path id="arr-co" d="M200,110 C320,20 380,20 440,110" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#ah)" opacity=".3"/>
      <text x="310" y="45" fill="#8b949e" font-size="11" text-anchor="middle">echecs >= seuil</text>
      <path id="arr-oh" d="M500,180 C540,260 440,300 370,240" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#ah)" opacity=".3"/>
      <text x="490" y="280" fill="#8b949e" font-size="11" text-anchor="middle">timeout expire</text>
      <path id="arr-hc" d="M280,220 C220,280 140,260 140,180" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#ah)" opacity=".3"/>
      <text x="170" y="290" fill="#8b949e" font-size="11" text-anchor="middle">succes</text>
      <path id="arr-ho" d="M370,190 C400,170 430,160 460,150" fill="none" stroke="#dc3545" stroke-width="2" marker-end="url(#ah)" opacity=".3"/>
      <text x="430" y="178" fill="#8b949e" font-size="10" text-anchor="middle">echec</text>
      <!-- States -->
      <g id="g-closed"><circle cx="150" cy="140" r="60" fill="#238636" opacity=".85" stroke="#238636" stroke-width="3"/><text x="150" y="135" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">CLOSED</text><text x="150" y="155" fill="#c5e8c5" font-size="11" text-anchor="middle">(Ferme)</text></g>
      <g id="g-open"><circle cx="490" cy="140" r="60" fill="#dc3545" opacity=".55" stroke="#dc3545" stroke-width="3"/><text x="490" y="135" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">OPEN</text><text x="490" y="155" fill="#f5c6cb" font-size="11" text-anchor="middle">(Ouvert)</text></g>
      <g id="g-half"><circle cx="320" cy="240" r="55" fill="#ffc107" opacity=".45" stroke="#ffc107" stroke-width="3"/><text x="320" y="235" fill="#000" font-size="14" font-weight="700" text-anchor="middle">HALF-OPEN</text><text x="320" y="255" fill="#333" font-size="10" text-anchor="middle">(Semi-ouvert)</text></g>
      <!-- Animated request dot -->
      <circle id="dot" r="6" fill="#58a6ff" opacity="0"/>
    </svg>
    <div class="countdown" id="countdown"></div>
  </div>
  <div class="controls">
    <div class="card">
      <h3>Actions</h3>
      <button id="btn-ok">Envoyer requete (succes)</button>
      <button id="btn-fail" class="fail">Envoyer requete (echec)</button>
    </div>
    <div class="card">
      <h3>Parametres</h3>
      <label>Seuil d'echecs : <strong id="v-thresh">3</strong></label>
      <input type="range" id="sl-thresh" min="1" max="10" value="3">
      <label>Timeout reset (s) : <strong id="v-timeout">5</strong></label>
      <input type="range" id="sl-timeout" min="1" max="10" value="5">
    </div>
    <div class="card">
      <h3>Statistiques</h3>
      <div class="stats-grid">
        <div class="stat"><div class="val" id="s-total">0</div><div class="lbl">Total requetes</div></div>
        <div class="stat"><div class="val" id="s-fail">0</div><div class="lbl">Echecs</div></div>
        <div class="stat"><div class="val" id="s-allowed">0</div><div class="lbl">Acceptees</div></div>
        <div class="stat"><div class="val" id="s-rejected">0</div><div class="lbl">Rejetees</div></div>
        <div class="stat"><div class="val" id="s-success">0</div><div class="lbl">Succes</div></div>
        <div class="stat"><div class="val" id="s-transitions">0</div><div class="lbl">Transitions</div></div>
      </div>
    </div>
  </div>
</div>
<div class="log-panel">
  <div class="card"><h3>Journal des requetes</h3><div id="log"></div></div>
</div>

<script>
const $ = id => document.getElementById(id);
const states = { CLOSED: 'closed', OPEN: 'open', HALF_OPEN: 'half' };
let state = states.CLOSED;
let failures = 0, successes = 0, totalReq = 0, allowed = 0, rejected = 0, transitions = 0;
let threshold = 3, resetTimeout = 5;
let openTimer = null, countdownVal = 0, countdownInterval = null;
let halfOpenTrials = 0;
const maxHalfOpenTrials = 2;

const gClosed = $('g-closed'), gOpen = $('g-open'), gHalf = $('g-half');
const arrCO = $('arr-co'), arrOH = $('arr-oh'), arrHC = $('arr-hc'), arrHO = $('arr-ho');

function updateVisuals() {
  [gClosed, gOpen, gHalf].forEach(g => { g.querySelector('circle').setAttribute('opacity', '.35'); g.classList.remove('glow-green','glow-red','glow-yellow'); });
  [arrCO, arrOH, arrHC, arrHO].forEach(a => { a.setAttribute('opacity', '.25'); a.classList.remove('arrow-anim'); });
  if (state === states.CLOSED) { gClosed.querySelector('circle').setAttribute('opacity', '.9'); gClosed.classList.add('glow-green'); }
  else if (state === states.OPEN) { gOpen.querySelector('circle').setAttribute('opacity', '.9'); gOpen.classList.add('glow-red'); }
  else { gHalf.querySelector('circle').setAttribute('opacity', '.9'); gHalf.classList.add('glow-yellow'); }
  updateStats();
}

function updateStats() {
  $('s-total').textContent = totalReq;
  $('s-fail').textContent = failures;
  $('s-allowed').textContent = allowed;
  $('s-rejected').textContent = rejected;
  $('s-success').textContent = successes;
  $('s-transitions').textContent = transitions;
}

function transitionTo(newState, arrow) {
  if (newState === state) return;
  state = newState;
  transitions++;
  if (arrow) { arrow.setAttribute('opacity', '1'); arrow.classList.add('arrow-anim'); setTimeout(() => { arrow.setAttribute('opacity', '.25'); arrow.classList.remove('arrow-anim'); }, 1200); }
  updateVisuals();
}

function startOpenTimer() {
  countdownVal = resetTimeout;
  $('countdown').textContent = `Ouvert — transition vers semi-ouvert dans ${countdownVal}s...`;
  $('countdown').classList.add('pulse');
  countdownInterval = setInterval(() => {
    countdownVal--;
    if (countdownVal <= 0) { clearInterval(countdownInterval); countdownInterval = null; $('countdown').textContent = ''; $('countdown').classList.remove('pulse'); goHalfOpen(); return; }
    $('countdown').textContent = `Ouvert — transition vers semi-ouvert dans ${countdownVal}s...`;
  }, 1000);
}

function clearTimers() {
  if (openTimer) { clearTimeout(openTimer); openTimer = null; }
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
  $('countdown').textContent = ''; $('countdown').classList.remove('pulse');
}

function goHalfOpen() {
  halfOpenTrials = 0;
  transitionTo(states.HALF_OPEN, arrOH);
  $('countdown').textContent = 'Test en cours... requetes limitees';
  $('countdown').classList.add('pulse');
}

function addLog(result, detail) {
  const d = new Date(), ts = d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const tagClass = state === states.CLOSED ? 'tag-closed' : state === states.OPEN ? 'tag-open' : 'tag-half';
  const stateLabel = state === states.CLOSED ? 'CLOSED' : state === states.OPEN ? 'OPEN' : 'HALF-OPEN';
  const el = document.createElement('div'); el.className = 'log-entry';
  el.innerHTML = `<span class="time">${ts}</span><span class="state-tag ${tagClass}">${stateLabel}</span><span>${result}</span><span style="color:#8b949e">${detail}</span>`;
  $('log').prepend(el);
  if ($('log').children.length > 80) $('log').removeChild($('log').lastChild);
}

function sendRequest(success) {
  totalReq++;
  if (state === states.OPEN) {
    rejected++;
    addLog('REJETEE', 'Circuit ouvert, requete bloquee');
    updateStats();
    return;
  }
  allowed++;
  if (state === states.CLOSED) {
    if (success) {
      successes++;
      failures = 0;
      addLog('SUCCES', `Echecs reinitialises (0/${threshold})`);
    } else {
      failures++;
      addLog('ECHEC', `Compteur echecs: ${failures}/${threshold}`);
      if (failures >= threshold) {
        addLog('TRANSITION', `Seuil atteint! Passage en OPEN`);
        transitionTo(states.OPEN, arrCO);
        startOpenTimer();
        return;
      }
    }
  } else if (state === states.HALF_OPEN) {
    halfOpenTrials++;
    if (success) {
      successes++;
      addLog('SUCCES', 'Test reussi! Retour en CLOSED');
      clearTimers();
      failures = 0;
      transitionTo(states.CLOSED, arrHC);
    } else {
      failures++;
      addLog('ECHEC', 'Test echoue! Retour en OPEN');
      clearTimers();
      transitionTo(states.OPEN, arrHO);
      startOpenTimer();
    }
    return;
  }
  updateVisuals();
}

$('btn-ok').addEventListener('click', () => sendRequest(true));
$('btn-fail').addEventListener('click', () => sendRequest(false));
$('sl-thresh').addEventListener('input', e => { threshold = +e.target.value; $('v-thresh').textContent = threshold; });
$('sl-timeout').addEventListener('input', e => { resetTimeout = +e.target.value; $('v-timeout').textContent = resetTimeout; });

updateVisuals();
</script>
</body>
</html>
